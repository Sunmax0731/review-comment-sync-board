<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>レビューコメント同期ボード</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:0;color:#1f2937;background:#f6f7f9}
    main{max-width:960px;margin:0 auto;padding:32px}
    h1{font-size:28px;margin:0 0 12px}
    section{border-top:1px solid #d1d5db;padding:18px 0}
    code{background:#e5e7eb;padding:2px 4px;border-radius:4px}
  </style>
</head>
<body>
  <main>
    <h1>レビューコメント同期ボード</h1>
    <p>連携ツール: Frame.io / Premiere Pro / DaVinci Resolve。タイムコード付きコメント、対応状況、差分版、再書き出し履歴を管理する。</p>
    <section><strong>状態:</strong> closed alpha / 手動テスト未実施</section>
    <section><strong>検証:</strong> <code>npm test</code> と <code>npm run validate</code></section>
    <section><strong>差別化:</strong> コメント、編集位置、対応済み証跡をタイムラインに戻せる。</section>
  </main>
</body>
</html>
